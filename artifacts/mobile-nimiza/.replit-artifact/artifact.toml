kind = "mobile"
previewPath = "/"
title = "NIMIZA - Interactive Learning"
version = "1.0.0"
id = "artifacts/mobile-nimiza"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 20993
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mobile-nimiza run dev"

[services.env]
PORT = "20993"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/mobile-nimiza", "run", "build"]
run = ["pnpm", "--filter", "@workspace/mobile-nimiza", "run", "serve"]
